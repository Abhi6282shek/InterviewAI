<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Arena - InterviewAI</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .arena-wrapper {
            padding: 40px 0;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }
        .setup-card, .question-card {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        .arena-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 24px;
        }
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }
        .question-text {
            font-size: 1.35rem;
            line-height: 1.6;
            margin-bottom: 24px;
            font-family: var(--font-heading);
            font-weight: 500;
        }
        .answer-textarea {
            width: 100%;
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 1rem;
            line-height: 1.6;
            resize: none;
            margin-bottom: 20px;
            transition: var(--transition-smooth);
        }
        .answer-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .timer-box {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--warning);
        }
        .voice-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        .record-pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--danger);
            display: none;
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 1; }
            to { transform: scale(1.5); opacity: 0.4; }
        }
        .bookmark-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
        }
        .bookmark-btn.active {
            border-color: var(--warning);
            color: var(--warning);
            background: rgba(245, 158, 11, 0.05);
        }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="arena-wrapper">
        <div class="container">
            
            <!-- SETUP SCREEN -->
            <div class="setup-card glass-panel" id="setup-screen">
                <h2 style="font-family: var(--font-heading); font-size: 1.75rem; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Initialize Mock Session
                </h2>
                <p style="color: var(--text-secondary); margin-bottom: 30px;">Select your parameters to trigger questions from the AI Engine.</p>
                
                <form id="setup-form">
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
                        <div class="form-group">
                            <label class="form-label" for="category">Category</label>
                            <select class="form-input" id="category" required style="background-color: var(--bg-secondary);">
                                <option value="Java">Java</option>
                                <option value="SQL">SQL</option>
                                <option value="Python">Python</option>
                                <option value="C++">C++</option>
                                <option value="JavaScript">JavaScript</option>
                                <option value="Spring Boot">Spring Boot</option>
                                <option value="AI & Machine Learning">AI & Machine Learning</option>
                                <option value="Data Structures & Algorithms">Data Structures & Algorithms</option>
                                <option value="Operating Systems">Operating Systems</option>
                                <option value="Computer Networks">Computer Networks</option>
                                <option value="HR Interview">HR Interview</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="difficulty">Difficulty</label>
                            <select class="form-input" id="difficulty" required style="background-color: var(--bg-secondary);">
                                <option value="Beginner">Beginner</option>
                                <option value="Intermediate">Intermediate</option>
                                <option value="Advanced">Advanced</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="type">Type</label>
                            <select class="form-input" id="type" required style="background-color: var(--bg-secondary);">
                                <option value="Technical">Technical</option>
                                <option value="HR">HR</option>
                                <option value="Mixed">Mixed</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Session</button>
                </form>
            </div>

            <!-- ACTIVE QUESTION SCREEN -->
            <div class="question-card glass-panel" id="arena-screen" style="display: none;">
                <div class="arena-header">
                    <div>
                        <span style="font-size: 0.85rem; color: var(--primary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;" id="arena-subtitle">JAVA • INTERMEDIATE</span>
                        <h2 style="font-family: var(--font-heading); font-size: 1.5rem;" id="question-index-label">Question 1 of 5</h2>
                    </div>
                    <div class="timer-box">
                        ⏱️ <span id="timer-display">02:00</span>
                    </div>
                </div>

                <div class="progress-bar-container">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>

                <div class="question-text" id="question-text">
                    Loading question...
                </div>

                <!-- Text Area for response -->
                <textarea class="answer-textarea" id="answer-input" rows="8" placeholder="Type your answer here in detail..."></textarea>

                <!-- Voice Recording Options -->
                <div class="voice-controls">
                    <button class="btn btn-secondary" id="voice-record-btn" type="button" style="padding: 10px 20px;">🎤 Record Answer (Voice-to-Text)</button>
                    <div class="record-pulse" id="record-pulse"></div>
                    <span id="voice-status" style="font-size: 0.85rem; color: var(--text-secondary);"></span>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 24px;">
                    <button class="bookmark-btn" id="bookmark-btn" type="button">☆ Bookmark Question</button>
                    <button class="btn btn-primary" id="submit-answer-btn" type="button">Submit & Next</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let interviewId = null;
        let questions = [];
        let currentIndex = 0;
        let activeTimer = null;
        let questionTimeTaken = 0;
        let categoryName = '';

        // Web Speech API Voice Recognition setup
        let recognition = null;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                const txtArea = document.getElementById('answer-input');
                if (finalTranscript) {
                    txtArea.value += (txtArea.value ? ' ' : '') + finalTranscript;
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error: ", event.error);
                stopRecording();
                API.showToast("Voice recognition failed: " + event.error, "error");
            };
        } else {
            document.getElementById('voice-record-btn').style.display = 'none';
        }

        const voiceBtn = document.getElementById('voice-record-btn');
        const pulse = document.getElementById('record-pulse');
        const statusSpan = document.getElementById('voice-status');

        voiceBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        function startRecording() {
            isRecording = true;
            recognition.start();
            voiceBtn.innerHTML = '🛑 Stop Recording';
            pulse.style.display = 'block';
            statusSpan.textContent = 'Listening (Speak into microphone)...';
        }

        function stopRecording() {
            isRecording = false;
            recognition.stop();
            voiceBtn.innerHTML = '🎤 Record Answer (Voice-to-Text)';
            pulse.style.display = 'none';
            statusSpan.textContent = '';
        }

        // Setup form trigger
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const category = document.getElementById('category').value;
            const difficulty = document.getElementById('difficulty').value;
            const type = document.getElementById('type').value;
            categoryName = category;

            try {
                const res = await API.post('/interviews/setup', { category, difficulty, type });
                interviewId = res.interviewId;
                questions = res.questions;
                currentIndex = 0;

                // Configure screen state
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('arena-screen').style.display = 'block';
                document.getElementById('arena-subtitle').textContent = `${category} • ${difficulty} • ${type}`;

                loadQuestion();
            } catch (err) {}
        });

        function loadQuestion() {
            if (currentIndex >= questions.length) {
                finalizeInterview();
                return;
            }

            // Stop voice recording if running
            if (isRecording) stopRecording();

            const q = questions[currentIndex];
            document.getElementById('question-index-label').textContent = `Question ${currentIndex + 1} of ${questions.length}`;
            document.getElementById('question-text').textContent = q.questionText;
            document.getElementById('answer-input').value = '';
            
            // Set bookmark state
            const bkBtn = document.getElementById('bookmark-btn');
            if (q.bookmarked) {
                bkBtn.classList.add('active');
                bkBtn.textContent = '★ Question Bookmarked';
            } else {
                bkBtn.classList.remove('active');
                bkBtn.textContent = '☆ Bookmark Question';
            }

            // Set progress bar fill
            const pct = ((currentIndex) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;

            // Reset question timers
            questionTimeTaken = 0;
            startTimer();
        }

        function startTimer() {
            if (activeTimer) clearInterval(activeTimer);

            let secondsLeft = 120; // 2 minutes per question
            updateTimerDisplay(secondsLeft);

            activeTimer = setInterval(() => {
                secondsLeft--;
                questionTimeTaken++;
                updateTimerDisplay(secondsLeft);

                if (secondsLeft <= 0) {
                    clearInterval(activeTimer);
                    API.showToast("Time's up! Submitting current answer.", "warning");
                    submitCurrentAnswer();
                }
            }, 1000);
        }

        function updateTimerDisplay(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').textContent = `${m}:${s}`;
        }

        // Bookmark Trigger
        document.getElementById('bookmark-btn').addEventListener('click', async () => {
            const q = questions[currentIndex];
            try {
                const res = await API.post(`/interviews/bookmark-question/${q.id}`);
                q.bookmarked = res.bookmarked;
                
                const bkBtn = document.getElementById('bookmark-btn');
                if (res.bookmarked) {
                    bkBtn.classList.add('active');
                    bkBtn.textContent = '★ Question Bookmarked';
                    API.showToast('Question bookmarked successfully!', 'success');
                } else {
                    bkBtn.classList.remove('active');
                    bkBtn.textContent = '☆ Bookmark Question';
                }
            } catch (err) {}
        });

        // Submit answer trigger
        document.getElementById('submit-answer-btn').addEventListener('click', () => {
            submitCurrentAnswer();
        });

        async function submitCurrentAnswer() {
            clearInterval(activeTimer);
            const q = questions[currentIndex];
            const userAnswer = document.getElementById('answer-input').value;

            try {
                await API.post('/interviews/submit-answer', {
                    questionId: q.id,
                    userAnswer: userAnswer,
                    timeTakenSeconds: questionTimeTaken
                });

                API.showToast('Answer submitted!', 'success');
                currentIndex++;
                loadQuestion();
            } catch (err) {
                // Keep timer running if fail to submit
                startTimer();
            }
        }

        async function finalizeInterview() {
            try {
                API.showLoader();
                const res = await API.post(`/${interviewId}/complete`); // note: endpoint is API_BASE_URL + "/{id}/complete"
                API.hideLoader();
                API.showToast('Mock Interview Completed!', 'success');
                setTimeout(() => {
                    window.location.href = `result.html?id=${interviewId}`;
                }, 1000);
            } catch (err) {
                // If endpoint path prefixing failed (we created it under /api/interviews/{id}/complete)
                // Let's call /api/interviews/{id}/complete instead:
                try {
                    const res = await API.post(`/interviews/${interviewId}/complete`);
                    API.hideLoader();
                    API.showToast('Mock Interview Completed!', 'success');
                    setTimeout(() => {
                        window.location.href = `result.html?id=${interviewId}`;
                    }, 1000);
                } catch (e) {
                    API.hideLoader();
                }
            }
        }
    </script>
</body>
</html>
