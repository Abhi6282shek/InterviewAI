<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - InterviewAI</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 40px 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-title {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar"></nav>

    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <h2 class="auth-title">Create Account</h2>
                <p class="auth-subtitle">Join us to start parsing resumes and grading interviews</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <input class="form-input" type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email Address</label>
                    <input class="form-input" type="email" id="reg-email" required placeholder="name@domain.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input class="form-input" type="password" id="reg-password" required placeholder="At least 6 characters" minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Register</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;

            try {
                const res = await API.post('/auth/register', { fullName, email, password });
                Auth.saveSession(res);
                API.showToast('Registration successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (err) {
                // Toasted automatically
            }
        });
    </script>
</body>
</html>
